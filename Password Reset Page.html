    <style>
        body{

            border-width: 2px;
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
            margin-top: 5px;
            padding: 5px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        ul.FAQ{
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.6s ease;
            list-style: none;

        }
