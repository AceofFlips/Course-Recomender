<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account Page</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-box {
            max-width: 50%;
        }
        .input-form {
            max-width: 75%;
        }
        .input-submit {
            max-width: 85%;
            min-width: 85%;
        }

    </style>
</head>
<body>
    <div class="d-flex justify-content-right">
        <a class="img" href="Home Page.html"><img class="logo" src="https://cmsv2-assets.apptegy.net/uploads/27023/logo/29836/FranklinTownship_web.png" alt="" width="400px" translate=""></a>
    </div>

    <div class="login-box container justify-content-center text-center bg-primary border rounded-5 border-black p-5">
        <form class="container justify-content-center input-form vstack gap-4" id="login-form">
            <div class="row justify-content-center">
                
            </div>
            <input class="p-2" type="email" name="email" placeholder="Email">
            <input class="p-2" type="password" name="password" placeholder="Password">
            <span class="d-flex justify-content-center">
                    <button class="p-2 input-submit text-light border border-1 border-light bg-primary" type="submit">Submit</button>
                </span>
            <a class="link-light" href="Login Page.html">have an account? sign in</a>

        </form>
    </div>
    <!-- jQuery 3.x CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 Bundle (JS + Popper) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
